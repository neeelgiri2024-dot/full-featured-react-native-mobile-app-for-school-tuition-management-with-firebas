name: Mobile CI (PR)

on:
  pull_request:
    paths:
      - 'android/**'
      - 'ios/**'
      - 'docs/deployment/mobile/**'
      - 'scripts/mobile/**'
      - '.github/**'
  workflow_dispatch:

jobs:
  lint_test_android:
    name: Android lint & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install JS dependencies (root + app workspace)
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          if [ -f app/package.json ]; then
            if [ -f app/package-lock.json ]; then
              npm -w app ci || npm -w app install
            else
              npm -w app install
            fi
          fi

      - name: Setup Java (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # TODO: adjust to 11/17 based on your Gradle version

      - name: Gradle cache
        uses: gradle/gradle-build-action@v2
        with:
          build-root-directory: app/android
        continue-on-error: true

      - name: Generate Android project if missing (Expo prebuild)
        run: |
          if [ ! -f app/android/gradlew ]; then
            echo "Running Expo prebuild for Android..."
            (cd app && npx expo prebuild --platform android --non-interactive)
          else
            echo "Android native project already present under app/android"
          fi

      - name: Run Android unit tests (skips if no project)
        run: |
          if [ -f app/android/gradlew ]; then
            (cd app/android && ./gradlew test --stacktrace || true) # TODO: adjust tasks per modules
          else
            echo "No Android project present under app/android; skipping tests."
          fi

      - name: Upload Android test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/android/**/build/reports/tests/*
            app/android/**/build/test-results/*
          if-no-files-found: ignore

  lint_test_ios:
    name: iOS lint & tests
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install JS dependencies (root + app workspace)
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          if [ -f app/package.json ]; then
            if [ -f app/package-lock.json ]; then
              npm -w app ci || npm -w app install
            else
              npm -w app install
            fi
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Fastlane
        run: |
          gem install fastlane --no-document

      - name: Generate iOS project if missing (Expo prebuild)
        run: |
          if [ -z "$(ls app/ios/*.xcworkspace 2>/dev/null || true)" ] && [ -z "$(ls app/ios/*.xcodeproj 2>/dev/null || true)" ]; then
            echo "Running Expo prebuild for iOS..."
            (cd app && npx expo prebuild --platform ios --non-interactive)
          else
            echo "iOS native project already present under app/ios"
          fi

      - name: Install CocoaPods (if Podfile exists)
        if: ${{ hashFiles('app/ios/Podfile') != '' }}
        run: |
          gem install cocoapods --no-document
          cd app/ios && pod install --repo-update

      - name: Run iOS unit tests (skips if no project)
        run: |
          IOS_WORKSPACE=$(ls app/ios/*.xcworkspace 2>/dev/null | head -n 1 || true)
          IOS_PROJECT=$(ls app/ios/*.xcodeproj 2>/dev/null | head -n 1 || true)
          IOS_SCHEME=${IOS_SCHEME:-App} # TODO: set your scheme
          if [ -n "$IOS_WORKSPACE" ] || [ -n "$IOS_PROJECT" ]; then
            set -x
            if [ -n "$IOS_WORKSPACE" ]; then
              xcodebuild -workspace "$IOS_WORKSPACE" -scheme "$IOS_SCHEME" -sdk iphonesimulator -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' test || true
            else
              xcodebuild -project "$IOS_PROJECT" -scheme "$IOS_SCHEME" -sdk iphonesimulator -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' test || true
            fi
          else
            echo "No iOS project present; skipping tests."
          fi

      - name: Upload iOS test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-reports
          path: |
            ~/Library/Logs/scan/*
            build/reports/tests/*
          if-no-files-found: ignore
